version: '3.8'

services:
  # The Core Go API Ledger Service
  rewards-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rewards_ledger_api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    restart: unless-stopped
    networks:
      - rewards-network

  # Interactive Swagger UI Documentation Engine
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.11.0
    container_name: rewards_ledger_swagger
    ports:
      - "8081:8080"
    environment:
      # temporary staging path
      - SWAGGER_JSON=/tmp/swagger.yaml
    volumes:
      # pointing the container destination path to /tmp/swagger.yaml
      - ./docs/swagger.yaml:/tmp/swagger.yaml:ro
    restart: unless-stopped
    networks:
      - rewards-network

networks:
  rewards-network:
    driver: bridge